name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --locked --group dev
      - run: uv run --locked ruff check .
      - run: uv run --locked ruff format --check .
      - run: uv build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: django_pg_ultrasearch
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d django_pg_ultrasearch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        django-version: ["5.2", "6.0"]
    env:
      DJANGO_DB_BACKEND: postgresql
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGDATABASE: django_pg_ultrasearch
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --group dev
      - run: uv pip install --python .venv/bin/python --reinstall "Django==${{ matrix.django-version }}.*"
      - run: uv run --no-sync pytest
